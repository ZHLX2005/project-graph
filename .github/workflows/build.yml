name: Build CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm nx run-many -t build --projects=@graphif/data-structures,@graphif/serializer,@graphif/shapes,extprg-types

      - name: TypeScript check
        run: pnpm --filter @graphif/project-graph type-check

      - name: ESLint
        run: pnpm eslint .

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build app (without Tauri bundle)
        run: pnpm run build:no-tauri

  build-tauri-windows:
    needs: [check]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm nx run-many -t build --projects=@graphif/data-structures,@graphif/serializer,@graphif/shapes,extprg-types

      - name: Build frontend
        run: pnpm run build:no-tauri

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Disable updater artifacts for CI
        run: node ./.github/scripts/disable-tauri-updater.mjs

      - name: Build Tauri app (Windows NSIS installer)
        run: pnpm --filter @graphif/project-graph tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: project-graph-windows-installer
          path: app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
